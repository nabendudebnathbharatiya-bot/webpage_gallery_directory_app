<!DOCTYPE html>
<html lang="bn" style="background-color: #000;">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>অপেক্ষা করুন | হেসে হেসে কোডিং শেখা</title>
    
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* ব্যাকআপ হিসেবে এখানেও কালো রং রাখা হলো */
        html, body { background-color: #000 !important; margin: 0; overflow: hidden; font-family: sans-serif; height: 100%; }
        
        .ad-viewport { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: #111; z-index: 10; }
        #ad-img { width: 100%; height: 100%; object-fit: cover; display: none; opacity: 1; transition: opacity 0.4s ease; z-index: 11; }
        
        .controls { position: fixed; top: 20px; right: 20px; z-index: 100; text-align: right; }
        .btn { background: #fbbf24; color: #000; font-weight: bold; padding: 12px 24px; border-radius: 12px; cursor: pointer; border: none; transition: 0.3s; box-shadow: 0 4px 15px rgba(251, 191, 36, 0.4); }
        .btn:hover { background: #f59e0b; transform: scale(1.05); }
        .timer { background: rgba(0,0,0,0.9); padding: 12px 20px; border: 2px solid #fbbf24; border-radius: 12px; display: none; margin-top: 10px; font-weight: bold; color: #fbbf24; font-size: 1.2rem; }
        .loading-text { color: #555; position: absolute; font-weight: bold; z-index: 12; }
    </style>
</head>
<body style="background-color: #000; color: white; margin: 0; overflow: hidden;">

    <audio id="bg-music" src="./music.mp3" loop></audio>

    <div class="ad-viewport" style="background-color: #111;">
        <div id="loader" class="loading-text animate-pulse text-xl">বিজ্ঞাপন লোড হচ্ছে...</div>
        <a id="ad-link" href="#" target="_blank">
            <img id="ad-img" src="" alt="Advertisement">
        </a>
    </div>

    <div class="controls">
        <button id="skip-btn" onclick="startTimer()" class="btn">CONTINUE TO TARGET <i class="fa-solid fa-arrow-right ml-2"></i></button>
        <div id="timer-box" class="timer tracking-widest">REDIRECTING IN: <span id="sec">15</span>s</div>
    </div>

    <script>
        let ads = [];
        let currentIdx = 0; 
        let isStarted = false;
        const urlParams = new URLSearchParams(window.location.search);
        const targetUrl = urlParams.get('target');

        // TXT ফাইল থেকে বিজ্ঞাপন লোড করার ফাংশন
        async function loadAds() {
            try {
                // ক্যাশ বাস্টারসহ ad_data.txt ফেচ করা (রেগুলার ফাইলের জন্য ad_data.txt করে নেবেন)
                const res = await fetch('./ad_data.txt?v=' + new Date().getTime());
                if (!res.ok) throw new Error("TXT file not found");
                
                const text = await res.text();
                const lines = text.split('\n');
                
                lines.forEach(line => {
                    const trimmedLine = line.trim();
                    if(trimmedLine !== '' && !trimmedLine.startsWith('//') && !trimmedLine.startsWith('#')) {
                        const parts = trimmedLine.split('|');
                        if(parts.length >= 2) {
                            ads.push({ img: parts[0].trim(), link: parts[1].trim() });
                        }
                    }
                });
                
                if(ads.length > 0) {
                    updateAd(0, true);
                    
                    setInterval(() => {
                        currentIdx = (currentIdx + 1) % ads.length;
                        updateAd(currentIdx, false);
                    }, 3000); 
                } else {
                    throw new Error("No ads found in txt");
                }
            } catch (e) { 
                console.error("Ads fail:", e);
                document.getElementById('loader').innerText = "অপেক্ষা করুন...";
            }
        }

        function updateAd(index, isFirstLoad) {
            const img = document.getElementById('ad-img');
            const link = document.getElementById('ad-link');
            const loader = document.getElementById('loader');
            if(!img || !ads[index]) return;

            if(isFirstLoad) {
                img.src = ads[index].img;
                link.href = ads[index].link;
                img.style.display = 'block';
                if(loader) loader.style.display = 'none';
                return;
            }

            const tempImg = new Image();
            tempImg.src = ads[index].img;
            
            tempImg.onload = () => {
                img.style.opacity = 0.4;
                setTimeout(() => {
                    img.src = ads[index].img;
                    link.href = ads[index].link;
                    img.style.display = 'block';
                    img.style.opacity = 1;
                    if(loader) loader.style.display = 'none';
                }, 200);
            };
        }

        function startTimer() {
            if(isStarted) return;
            isStarted = true;

            const audio = document.getElementById('bg-music');
            if(audio) audio.play().catch(() => {});

            document.getElementById('skip-btn').style.display = 'none';
            document.getElementById('timer-box').style.display = 'block';
            
            let count = 15; 
            const interval = setInterval(() => {
                count--;
                document.getElementById('sec').innerText = count;
                if(count <= 0) {
                    clearInterval(interval);
                    window.location.href = targetUrl ? decodeURIComponent(targetUrl) : './index.html';
                }
            }, 1000);
        }

        document.addEventListener('DOMContentLoaded', loadAds);
    </script>
</body>
</html>
