    <style>
    /* =========================================
   UNIVERSAL BOT GLOW (সব বটের জন্য উপযুক্ত)
========================================= */
@keyframes universalGlow {
    0%, 75% {
        /* শান্ত অবস্থা */
        box-shadow: 0 0 0 0 rgba(156, 163, 175, 0); 
        transform: scale(1);
    }
    82% {
        /* প্রথম বড় গ্লো (স্নিগ্ধ সিলভার/গ্লাস এফেক্ট) */
        box-shadow: 0 0 20px 6px rgba(156, 163, 175, 0.55);
        transform: scale(1.08);
    }
    89% {
        box-shadow: 0 0 0 0 rgba(156, 163, 175, 0);
        transform: scale(1);
    }
    96% {
        /* দ্বিতীয় ছোট পালস */
        box-shadow: 0 0 12px 3px rgba(156, 163, 175, 0.35);
        transform: scale(1.05);
    }
    100% {
        box-shadow: 0 0 0 0 rgba(156, 163, 175, 0);
        transform: scale(1);
    }
}

.chakra-universal-glow {
    animation: universalGlow 8s infinite;
    border-radius: 50%;
    transition: all 0.3s ease-in-out;
}
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .typing-dot { animation: typing 1.8s infinite ease-in-out both; }
        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes typing { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
    </style>

<script>
    // --- গ্লোবাল ভেরিয়েবলস ---
    let allBots = [];
    let currentBot = null;
    let lastSuggestedKeyword = null; 
    let currentTopic = null; 
    let currentOptions = []; 
    let caseStartTime = null; 
    let pendingDelete = false; 
    let lastContextActive = false; 
    let pendingQuizAnswer = null; 

    // 💡 ডায়নামিক ফর্ম ফিলিং
    let pendingSaveKey = null; 
    let pendingConfirmText = ""; 
    
    let userScore = 0;
    let userName = localStorage.getItem('chakra_userName') || ""; 

    // 🧠 AI Brain Variables
    let aiBrain = new brain.recurrent.LSTM(); 
    let isAiReady = false; 

    const b2e = s => s.replace(/[০-৯]/g, d => "০১২৩৪৫৬৭৮৯".indexOf(d));

    const chatBox = document.getElementById('chat-box');
    const userInput = document.getElementById('user-input');
    const botAvatar = document.getElementById('bot-avatar');
    const botName = document.getElementById('bot-name');
    const botContainer = document.getElementById('bot-container');
    const botSelector = document.getElementById('bot-selector');
    const typingIndicator = document.getElementById('typing-indicator');
    const quickRepliesDiv = document.getElementById('quick-replies');

    function copyBotMessage(buttonElement, rawText) {
        if (!rawText || !navigator.clipboard) return;
        const tempDiv = document.createElement("div");
        tempDiv.innerHTML = rawText;
        const cleanText = tempDiv.textContent || tempDiv.innerText || "";
        
        navigator.clipboard.writeText(cleanText).then(() => {
            const originalIcon = buttonElement.innerHTML;
            buttonElement.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4 text-green-600"><path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5" /></svg>`;
            buttonElement.disabled = true;
            setTimeout(() => { buttonElement.innerHTML = originalIcon; buttonElement.disabled = false; }, 3000); 
        }).catch(err => {
            console.error('কপি করতে ব্যর্থ: ', err); buttonElement.title = 'কপি করতে ব্যর্থ!';
        });
    }

    const getScoreKey = (botName) => `chakra_userScore_${encodeURIComponent(botName)}`;
    function loadBotScore() { if (!currentBot) { userScore = 0; return 0; } userScore = parseInt(localStorage.getItem(getScoreKey(currentBot.name))) || 0; return userScore; }
    function saveBotScore() { if (!currentBot) return; localStorage.setItem(getScoreKey(currentBot.name), String(userScore)); }

    function safeCalc(rawExpr) {
        if (!rawExpr) throw new Error("Empty expression");
        let expr = b2e(rawExpr);
        expr = expr.replace(/[^0-9+\-*/().\s]/g, '');
        if (expr.length > 200) throw new Error("Expression too long");
        
        const tokens = []; let i = 0;
        function isDigit(ch) { return ch >= '0' && ch <= '9'; }
        while (i < expr.length) {
            const ch = expr[i];
            if (ch === ' ' || ch === '\t' || ch === '\n') { i++; continue; }
            if (isDigit(ch) || ch === '.') {
                let numStr = ''; let dotCount = 0;
                while (i < expr.length && (isDigit(expr[i]) || expr[i] === '.')) {
                    if (expr[i] === '.') dotCount++;
                    if (dotCount > 1) throw new Error("Invalid number");
                    numStr += expr[i]; i++;
                }
                if (numStr === '.' || numStr === '') throw new Error("Invalid number");
                tokens.push({ type: 'num', value: parseFloat(numStr) });
                continue;
            }
            if ('+-*/()'.includes(ch)) { tokens.push({ type: 'op', value: ch }); i++; continue; }
            throw new Error("Invalid character");
        }

        const output = []; const ops = [];
        function precedence(op) { if (op === 'u-') return 3; if (op === '*' || op === '/') return 2; if (op === '+' || op === '-') return 1; return 0; }
        function isLeftAssoc(op) { return op !== 'u-'; }

        let prev = null;
        for (let t of tokens) {
            if (t.type === 'num') { output.push(t); prev = t; continue; }
            const v = t.value;
            if (v === '(') { ops.push('('); prev = t; continue; }
            if (v === ')') {
                while (ops.length && ops[ops.length - 1] !== '(') output.push({ type: 'op', value: ops.pop() });
                if (!ops.length) throw new Error("Mismatched parentheses");
                ops.pop(); prev = t; continue;
            }
            let op = v;
            const prevIsOpOrStart = (!prev) || (prev.type === 'op' && prev.value !== ')') || (prev.type === 'op' && prev.value === '(');
            if (op === '-' && prevIsOpOrStart) op = 'u-';
            while (ops.length) {
                const top = ops[ops.length - 1];
                if (top === '(') break;
                const pTop = precedence(top); const pOp = precedence(op);
                if ((isLeftAssoc(op) && pOp <= pTop) || (!isLeftAssoc(op) && pOp < pTop)) output.push({ type: 'op', value: ops.pop() });
                else break;
            }
            ops.push(op); prev = t;
        }
        while (ops.length) {
            const op = ops.pop();
            if (op === '(') throw new Error("Mismatched parentheses");
            output.push({ type: 'op', value: op });
        }

        const stack = [];
        for (let t of output) {
            if (t.type === 'num') { stack.push(t.value); continue; }
            const op = t.value;
            if (op === 'u-') {
                if (stack.length < 1) throw new Error("Invalid expression");
                stack.push(-stack.pop()); continue;
            }
            if (stack.length < 2) throw new Error("Invalid expression");
            const b = stack.pop(); const a = stack.pop(); let res = 0;
            if (op === '+') res = a + b; else if (op === '-') res = a - b; else if (op === '*') res = a * b;
            else if (op === '/') { if (b === 0) throw new Error("Division by zero"); res = a / b; }
            else throw new Error("Unknown operator");
            stack.push(res);
        }
        if (stack.length !== 1) throw new Error("Invalid expression");
        const result = stack[0];
        if (!Number.isFinite(result)) throw new Error("Invalid result");
        return Math.round((result + Number.EPSILON) * 1e10) / 1e10;
    }

    async function loadBotData() {
        try {
            const ts = new Date().getTime(); 
            const indexResponse = await fetch('bot_list.txt?v=' + ts);
            if (!indexResponse.ok) throw new Error("মাস্টার ফাইল (bot_list.txt) পাওয়া যায়নি।");
            
            const indexText = await indexResponse.text();
            const botDataFiles = indexText.split('\n').map(line => line.trim()).filter(line => line.length > 0 && !line.startsWith('//'));
            
            if (botDataFiles.length === 0) throw new Error("bot_list.txt ফাইলে কোনো বটের নাম নেই।");
            
            let combinedText = "";
            const fetchPromises = botDataFiles.map(file => fetch(file + '?v=' + ts));
            const responses = await Promise.all(fetchPromises);
            
            let hasValidData = false;
            for (let i = 0; i < responses.length; i++) {
                if (!responses[i].ok) { console.warn(`⚠️ Warning: ${botDataFiles[i]} ফাইলটি পাওয়া যায়নি।`); continue; }
                const text = await responses[i].text();
                combinedText += text + "\n";
                hasValidData = true;
            }
            
            if (!hasValidData || !combinedText.trim()) throw new Error("কোনো বৈধ ডেটা ফাইল খুঁজে পাওয়া যায়নি।");
            parseData(combinedText);
        } catch (error) {
            botSelector.innerHTML = '<option>ডেটা লোড ব্যর্থ!</option>';
            chatBox.innerHTML = `<div class="p-4 text-red-600 bg-red-100 rounded-lg text-sm text-center font-medium mx-4 mt-4 shadow-sm border border-red-200">⚠️ ডেটা লোড করতে সমস্যা হয়েছে:<br>${error.message}</div>`;
        }
    }

    function parseData(text) {
        const blocks = text.split('#BOT_START');
        allBots = [];
        blocks.forEach(block => {
            if(!block.includes('#BOT_END')) return;
            const botStr = block.split('#BOT_END')[0];
            const bot = { triggers: [], prefixes: [], buttons: [], greetingMorning: [], greetingAfternoon: [], greetingEvening: [], greetingNight: [] };
            let currentTrigger = null;
            const lines = botStr.split('\n');
            lines.forEach(line => {
                const tLine = line.trim();
                if(tLine.startsWith('Name:')) bot.name = tLine.replace('Name:', '').trim();
                else if(tLine.startsWith('Image:')) bot.image = tLine.replace('Image:', '').trim();
                else if(tLine.startsWith('Theme:')) bot.theme = tLine.replace('Theme:', '').trim();
                else if(tLine.startsWith('Welcome:')) bot.welcome = tLine.replace('Welcome:', '').trim();
                else if(tLine.startsWith('Brain:')) bot.brainFile = tLine.replace('Brain:', '').trim(); // 🧠 AI Brain File Parser
                else if(tLine.startsWith('Buttons:')) bot.buttons = tLine.replace('Buttons:', '').split('|').map(s=>s.trim()).filter(Boolean);
                else if(tLine.startsWith('Prefix:')) bot.prefixes = tLine.replace('Prefix:', '').split('|').map(s=>s.trim()).filter(Boolean);
                else if(tLine.startsWith('GreetingMorning:')) bot.greetingMorning = tLine.replace('GreetingMorning:', '').split('|').map(s=>s.trim()).filter(Boolean);
                else if(tLine.startsWith('GreetingAfternoon:')) bot.greetingAfternoon = tLine.replace('GreetingAfternoon:', '').split('|').map(s=>s.trim()).filter(Boolean);
                else if(tLine.startsWith('GreetingEvening:')) bot.greetingEvening = tLine.replace('GreetingEvening:', '').split('|').map(s=>s.trim()).filter(Boolean);
                else if(tLine.startsWith('GreetingNight:')) bot.greetingNight = tLine.replace('GreetingNight:', '').split('|').map(s=>s.trim()).filter(Boolean);
                else if(tLine.startsWith('Trigger:')) {
                    currentTrigger = tLine.replace('Trigger:', '').split('|').map(s=>s.trim().toLowerCase()).filter(Boolean);
                }
                else if(tLine.startsWith('Response:') && currentTrigger) {
                    bot.triggers.push({ keywords: currentTrigger, responses: tLine.replace('Response:', '').split('||').map(s=>s.trim()).filter(Boolean) });
                    currentTrigger = null;
                }
            });
            if(bot.name) allBots.push(bot);
        });
        
        if(allBots.length === 0) {
            botSelector.innerHTML = '<option>ডেটা নেই</option>';
            chatBox.innerHTML = `<div class="p-4 text-yellow-700 bg-yellow-100 rounded-lg text-sm text-center mx-4 mt-4 border border-yellow-200">কোনো ডেটা পাওয়া যায়নি।</div>`;
            return;
        }
        setupBotSelector();
    }

    function setupBotSelector() {
        botSelector.innerHTML = '';
        allBots.forEach((bot, index) => {
            const option = document.createElement('option');
            option.value = index; option.text = bot.image + " " + bot.name;
            botSelector.appendChild(option);
        });
        if(allBots.length > 0) changeBot();
    }

    function getBotSpecificGreeting() {
        const h = new Date().getHours();
        let arr = h>=5&&h<12 ? currentBot.greetingMorning : h>=12&&h<17 ? currentBot.greetingAfternoon : h>=17&&h<20 ? currentBot.greetingEvening : currentBot.greetingNight;
        return (arr && arr.length>0) ? arr[Math.floor(Math.random()*arr.length)] : ""; 
    }

    // ==========================================
    // 🧠 AI Brain Fetcher (Dynamic JSON Loader)
    // ==========================================
    async function loadAIBrain(fileName) {
        isAiReady = false; 
        try {
            console.log(`🧠 AI Brain Loading: ${fileName}...`);
            const response = await fetch(fileName + '?v=' + new Date().getTime());
            if (!response.ok) throw new Error("Brain file not found!");
            
            const brainData = await response.json();
            aiBrain.fromJSON(brainData); // কোনো হ্যাং ছাড়া সরাসরি ব্রেন বসানো
            isAiReady = true;
            console.log(`✅ AI Brain Loaded Successfully for ${currentBot.name}!`);
        } catch (error) {
            console.warn(`⚠️ AI Brain load failed: ${error.message}`);
            isAiReady = false; 
        }
    }

    function changeBot() {
        const idx = botSelector.value;
        currentBot = allBots[idx];
        loadBotScore();
        lastSuggestedKeyword = null; pendingDelete = false; lastContextActive = false;
        pendingSaveKey = null; window.activeQuizState = null; pendingQuizAnswer = null; 
        botName.innerText = currentBot.name; botAvatar.innerText = currentBot.image;
        botContainer.className = `w-full max-w-md rounded-2xl shadow-2xl overflow-hidden flex flex-col h-[650px] border border-gray-200 transition-colors duration-500 ${currentBot.theme || 'bg-white'}`;
        chatBox.innerHTML = '';
        
        let savedChat = JSON.parse(localStorage.getItem(`chakra_chat_${currentBot.name}`)) || [];
        
        if (savedChat.length > 0) {
    savedChat.forEach(msg => appendMessageUI(msg.text, msg.sender));
} else {
    let greet = getBotSpecificGreeting();
    let rawWelcome = currentBot.welcome || "";
    let finalWelcomeMessage = "";
    
    if (userName) {
        // ১. যদি ইউজারের নাম আগে থেকে সেভ করা থাকে
        if (rawWelcome.includes('[USER_NAME]')) {
            rawWelcome = rawWelcome.replace(/\[USER_NAME\]/g, userName);
            finalWelcomeMessage = greet ? `${greet} ${rawWelcome}` : rawWelcome;
        } else {
            // txt ফাইলে [USER_NAME] ট্যাগ না থাকলেও নিজে থেকে নাম যুক্ত করে নেবে
            finalWelcomeMessage = greet ? `${greet} ${userName}, ${rawWelcome}` : `${userName}, ${rawWelcome}`;
        }
    } else {
        // ২. যদি নাম সেভ করা না থাকে
        rawWelcome = rawWelcome.replace(/\[USER_NAME\]\s*/g, '');
        finalWelcomeMessage = greet ? `${greet} ${rawWelcome}` : rawWelcome;
        // নামের জন্য প্রম্পট যুক্ত করা হলো
        finalWelcomeMessage += "<br><br><span class='text-sm text-gray-500'>💡 <i>আপনার নাম আমার জানা নেই, আপনি কী নামটি বলবেন? লিখুন <b>আমার নাম ____</b> (অথবা <b>'শুরু'</b> লিখে এগিয়ে যান)</i></span>";
    }
    
    appendMessage(finalWelcomeMessage, 'bot');
}
        showQuickReplies();

        // 🧠 Load new Brain if available
        if (currentBot.brainFile) {
            loadAIBrain(currentBot.brainFile);
        } else {
            isAiReady = false; 
        }
    }

    function showQuickReplies() {
        quickRepliesDiv.innerHTML = '';
        if (currentBot.buttons && currentBot.buttons.length > 0) {
            currentBot.buttons.forEach(t => {
                const btn = document.createElement('button');
                btn.onclick = () => { userInput.value = t; handleUserMessage(); };
                btn.className = "whitespace-nowrap bg-blue-50 hover:bg-blue-100 text-blue-700 text-xs font-medium px-4 py-2 rounded-full border border-blue-200 shadow-sm";
                btn.innerText = t; quickRepliesDiv.appendChild(btn);
            });
            quickRepliesDiv.classList.remove('hidden');
        } else quickRepliesDiv.classList.add('hidden');
    }

    function handleKeyPress(e) { if (e.key === 'Enter') handleUserMessage(); }

    function appendMessageUI(text, sender, isTyping = false) {
        const isUser = sender === 'user';
        const div = document.createElement('div');
        div.className = `flex items-start gap-2 ${isUser ? 'justify-end' : ''}`;
        
        let fmt = String(text).replace(/\[IMG:(.*?)\]/g, '<img src="$1" class="w-full max-w-[200px] mt-2 rounded-lg border shadow-sm">');
        
        const messageBubble = document.createElement('div');
        messageBubble.className = `p-3 text-sm max-w-[85%] shadow-sm leading-relaxed overflow-hidden ${isUser ? 'bg-blue-600 text-white rounded-2xl rounded-tr-none' : 'bg-white border text-gray-800 rounded-2xl rounded-tl-none'}`;

        let copyBtn = null;
        if (isUser) { 
            div.appendChild(messageBubble); 
        } else {
            const wrapper = document.createElement('div');
            wrapper.className = 'relative group'; 
            
            copyBtn = document.createElement('button');
            copyBtn.className = `absolute top-1.5 right-1.5 p-1 rounded-full bg-gray-50 text-gray-500 opacity-0 group-hover:opacity-100 transition-opacity duration-200 hover:bg-gray-200 active:scale-95 ${isTyping ? 'hidden' : ''}`;
            copyBtn.title = 'কপি করুন';
            copyBtn.onclick = () => copyBotMessage(copyBtn, text);

        if (/(স্কোর|score)/i.test(searchText)) { loadBotScore(); return { text: `${userName ? userName + ", " : ""}এই বটের বর্তমান মোট স্কোর হলো: 🏆 ${userScore} পয়েন্ট!`, showButtons: true }; }
        if (/(এখন ক[য়য়]টা|ক[য়য়]টা বাজে|বর্তমান সম[য়য়]|current time|এখন সম[য়য়]|টাইম কত|কত বাজে|কতো বাজে|কটা বাজে|কোটা বাজে|সম[য়য়] কত|কয়টা বাজে)/i.test(searchText)) {
            let timeStr = new Date().toLocaleTimeString('bn-IN', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true }); return { text: `এখন সময়: ⌚ <b>${timeStr}</b>`, showButtons: true };
        }

        if (/(ডার্ক মোড|dark mode)/i.test(searchText)) { const body = document.getElementById('main-body'); body.classList.remove('bg-gray-100'); body.classList.add('bg-gray-900'); return { text: "ডার্ক মোড চালু করা হলো! 🌙", showButtons: true }; }
        if (/(লাইট মোড|light mode)/i.test(searchText)) { const body = document.getElementById('main-body'); body.classList.remove('bg-gray-900'); body.classList.add('bg-gray-100'); return { text: "লাইট মোড চালু করা হলো! ☀️", showButtons: true }; }

        // ==========================================
        // 🔄 রিহ্যাবিলিটেটেড: অপশন সিলেক্টর (Smart Menu Assistant)
        // ==========================================
        let isOnlyNumber = /^[0-9০-৯]+$/.test(cleanText); 
        let parsedNum = parseInt(b2e(searchText)); 
        
        // যদি ইউজার শুধু নম্বর লেখে এবং আমাদের পকেটে অপশন সেভ করা থাকে
        if (isOnlyNumber && !isNaN(parsedNum) && currentOptions && currentOptions.length > 0 && parsedNum > 0 && parsedNum <= currentOptions.length) {
            searchText = currentOptions[parsedNum - 1]; // নম্বরটাকে জাদুর মতো আসল শব্দে বদলে দাও!
            lastSuggestedKeyword = null; 
        }

        // ==========================================
        // 🧠 রিস্টোরড: শর্ট-টার্ম মেমোরি (The Context Saver)
        // ==========================================
        if (lastSuggestedKeyword) {
            let isNo = /(^|\s)(না|no|থাক|বাদ|নেক্সট|স্টপ|এখন না)(\s|$|[.,?!])/i.test(searchText);
            let isYes = /(^|\s)(হ্যাঁ|হ্যা|yes|ok|বলুন|ঠিক আছে|চাই|অবশ্যই|দিন|করুন|প্রস্তুত|শুনবো|জানতে চাই)(\s|$|[.,?!])/i.test(searchText);

            if (isNo) {
                lastSuggestedKeyword = null; 
                searchText = searchText.replace(/(^|\s)(না|no|থাক|বাদ|নেক্সট|স্টপ|এখন না)(\s|$|[.,?!])/gi, ' ').trim();
                if (searchText === "") return { text: "ঠিক আছে! অন্য কী বিষয়ে জানতে চান?", showButtons: true };
            } else if (isYes && searchText.length < 25) {
                searchText = lastSuggestedKeyword; // 'হ্যাঁ' লিখলে বট সেটাকে আগের সাজেস্ট করা শব্দে বদলে নেবে!
                lastSuggestedKeyword = null; 
            } else {
                lastSuggestedKeyword = null;
            }
        }

        // ==========================================
        // 🚀 THE ULTIMATE HYBRID ENGINE (Fuse.js + Brain.js)
        // ==========================================
        let matchedResponses = []; 
        let isDefaultResponse = false; 
        let shouldShowButtons = false;

        // 🎯 ধাপ ১: শার্প শুটার (Fuse.js)
        const fuse = new Fuse(currentBot.triggers, { includeScore: true, keys: ['keywords'], threshold: 0.4 }); 
        const results = fuse.search(searchText);

        if (results.length > 0 && results[0].score <= 0.4) {
            matchedResponses = results[0].item.responses;
        } 
        else if (isAiReady) {
            // 🧠 ধাপ ২: দ্য থিংকার (Brain.js LSTM)
            let aiPrediction = aiBrain.run(searchText);
            
            if (aiPrediction && aiPrediction.startsWith('intent_')) {
                let intentIndex = parseInt(aiPrediction.split('_')[1]);
                if (currentBot.triggers[intentIndex]) {
                    matchedResponses = currentBot.triggers[intentIndex].responses;
                }
            }
        }

        // 🛡️ ধাপ ৩: দুজনেই ব্যর্থ হলে ফলব্যাক
        if (matchedResponses.length === 0) {
            isDefaultResponse = true; 
            shouldShowButtons = true; 
            matchedResponses = ["আমি ঠিক বুঝতে পারলাম না। আপনি কি নিচের বিষয়গুলো থেকে কিছু জানতে চান?"];
        }

        // =========================
        // 🎯 Response Building & Memory Extraction
        // =========================
        let coreResponse = matchedResponses[Math.floor(Math.random() * matchedResponses.length)];
        
        // 🌊 গঙ্গার জলে বিসর্জন লজিক (Memory Cleanup)
        const suggestions = coreResponse.match(/'([^']+)'/g);
        if (suggestions && suggestions.length > 0) { 
            // নতুন কোটেশন পেলে পকেটে ভরবে
            currentOptions = suggestions.map(s => s.replace(/'/g, '').toLowerCase()); 
            lastSuggestedKeyword = currentOptions[currentOptions.length - 1]; 
        } else { 
            // নতুন কোটেশন না পেলে আগের সব ছিঁড়ে গঙ্গার জলে ফেলে দেবে! 💥
            lastSuggestedKeyword = null; 
            currentOptions = []; 
        }

        if (!isDefaultResponse && currentBot.prefixes && currentBot.prefixes.length > 0 && Math.random() < 0.40) { 
            finalResponse += currentBot.prefixes[Math.floor(Math.random() * currentBot.prefixes.length)] + " "; 
        }
        finalResponse += coreResponse; 
        finalResponse = finalResponse.replace(/\[USER_NAME\]\s*/g, ''); 

        if (userName && !isDefaultResponse && Math.random() < 0.25) {
            let namePrefixes = [`${userName}, `, `শুনুন ${userName}, `, `আরে ${userName}, `];
            finalResponse = namePrefixes[Math.floor(Math.random() * namePrefixes.length)] + finalResponse;
        }

        // 💡 Tag Replacements (FIRE, SAVE, VARIABLES)
        let fireMatch = finalResponse.match(/\[FIRE:([^\]]+)\]/);
        if (fireMatch) {
            let nextKeyword = fireMatch[1].trim().toLowerCase(); finalResponse = finalResponse.replace(fireMatch[0], '').trim();
            const fuseFire = new Fuse(currentBot.triggers, { keys: ['keywords'], threshold: 0.2 }); const fireResults = fuseFire.search(nextKeyword);
            if (fireResults.length > 0) { let extraResponse = fireResults[0].item.responses[0]; finalResponse += " " + extraResponse; }
        }

        let saveMatch = finalResponse.match(/\[SAVE:([^|]+)\|(.*?)\]/);
        if (saveMatch) { pendingSaveKey = saveMatch[1].trim(); pendingConfirmText = saveMatch[2].trim(); finalResponse = finalResponse.replace(saveMatch[0], '').trim(); }

        finalResponse = finalResponse.replace(/\{([^}]+)\}/g, (match, key) => { return userData[key.trim()] || ""; });

        if (finalResponse.includes('[START_TIMER]')) { caseStartTime = new Date(); finalResponse = finalResponse.replace('[START_TIMER]', '').trim(); }
        if (finalResponse.includes('[STOP_TIMER]')) {
            if (caseStartTime) {
                let diff = Math.floor((new Date() - caseStartTime) / 1000); let m = Math.floor(diff / 60); let s = diff % 60; let tStr = (m > 0 ? m + " মিনিট " : "") + s + " সেকেন্ড";
                finalResponse = finalResponse.replace('[STOP_TIMER]', `<br><br><span class="text-green-700 font-bold bg-green-100 px-3 py-1 rounded-full text-xs">⏱️ কেস সলভের সময়: ${tStr}</span>`); caseStartTime = null;
            } else finalResponse = finalResponse.replace('[STOP_TIMER]', '');
        }

        const scoreMatch = finalResponse.match(/\[SCORE:(\d+)\]/);
        if (scoreMatch) { let pts = parseInt(scoreMatch[1]); userScore += pts; saveBotScore(); finalResponse = finalResponse.replace(scoreMatch[0], `<br><br><span class="text-yellow-800 font-bold bg-yellow-100 px-3 py-1 rounded-full text-xs border border-yellow-300 shadow-sm">🏆 +${pts} পয়েন্ট! (এই বটে মোট: ${userScore})</span>`); }

        const ts = new Date().getTime(); 
        finalResponse = finalResponse.replace(/\[VIDEO:(.*?)\|(.*?)\|(.*?)\]/g, (match, url, start, end) => { let sep = url.includes('?') ? '&' : '?'; return `<video src="${url}${sep}v=${ts}#t=${start},${end}" controls preload="none" class="w-full mt-2 rounded-lg shadow-sm"></video>`; });
        // Lottie Animation Replace Logic
finalResponse = finalResponse.replace(/\[LOTTIE:(.*?)\]/g, (match, url) => { 
    return `<lottie-player src="${url.trim()}" background="transparent" speed="1" style="width: 100%; max-width: 200px; margin-top: 10px; border-radius: 8px;" loop autoplay></lottie-player>`; 
});
        finalResponse = finalResponse.replace(/\[AUDIO:(.*?)\|(.*?)\|(.*?)\]/g, (match, url, start, end) => { let sep = url.includes('?') ? '&' : '?'; return `<audio src="${url}${sep}v=${ts}#t=${start},${end}" controls preload="none" class="w-full mt-2"></audio>`; });
        finalResponse = finalResponse.replace(/\[YT:(.*?)\|(.*?)\|(.*?)\]/g, (match, id, start, end) => { return `<iframe src="https://www.youtube.com/embed/${id}?start=${start}&end=${end}" controls preload="none" allowfullscreen class="w-full aspect-video mt-2 rounded-lg shadow-sm"></iframe>`; });
        finalResponse = finalResponse.replace(/\[LINK:(.*?)\|(.*?)\]/g, (match, url, text) => { let cleanUrl = url.trim(); if (!cleanUrl.startsWith('http://') && !cleanUrl.startsWith('https://')) cleanUrl = 'https://' + cleanUrl; return `<a href="${cleanUrl}" target="_blank" class="text-blue-600 hover:text-blue-800 underline font-bold transition-colors">${text.trim()}</a>`; });

        return { text: finalResponse, showButtons: shouldShowButtons };
    }
    loadBotData();
</script>
