<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini AI সাবটাইটেল জেনারেটর</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f3f4f6; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        h2 { text-align: center; color: #1f2937; margin-bottom: 5px; }
        p.subtitle { text-align: center; color: #6b7280; font-size: 14px; margin-bottom: 25px; }
        label { font-weight: bold; color: #374151; display: block; margin-top: 15px; margin-bottom: 5px; }
        input[type="text"], input[type="file"] { width: 100%; padding: 10px; border: 1px solid #d1d5db; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; background-color: #2563eb; color: white; border: none; padding: 12px; margin-top: 20px; font-size: 16px; font-weight: bold; border-radius: 6px; cursor: pointer; transition: 0.3s; }
        button:hover { background-color: #1d4ed8; }
        button:disabled { background-color: #9ca3af; cursor: not-allowed; }
        textarea { width: 100%; height: 200px; padding: 10px; border: 1px solid #d1d5db; border-radius: 6px; box-sizing: border-box; font-family: monospace; resize: vertical; margin-top: 5px; }
        .warning { color: #dc2626; font-size: 12px; margin-top: 5px; font-weight: bold; }
        #status { color: #059669; font-weight: bold; text-align: center; margin-top: 15px; display: none; }
        #downloadBtn { background-color: #16a34a; display: none; }
        #downloadBtn:hover { background-color: #15803d; }
    </style>
</head>
<body>

    <div class="container">
        <h2>🎬 Gemini AI সাবটাইটেল মেকার</h2>
        <p class="subtitle">যেকোনো ছোট ভিডিও আপলোড করুন, এআই নিজে শুনে সাবটাইটেল বানাবে</p>

        <label>১. আপনার Gemini API Key দিন:</label>
        <input type="text" id="apiKey" placeholder="AIzaSy...">

        <label>২. ভিডিও বা অডিও ফাইল সিলেক্ট করুন:</label>
        <input type="file" id="mediaFile" accept="video/mp4, video/webm, audio/mp3, audio/wav">
        <div class="warning">⚠️ ব্রাউজারের লিমিটেশনের জন্য ফাইল সাইজ সর্বোচ্চ ১৫-২০ MB এর মধ্যে রাখুন।</div>

        <button id="generateBtn" onclick="generateSubtitle()">🚀 সাবটাইটেল তৈরি করুন</button>
        <p id="status">⏳ এআই ভিডিওটি শুনছে এবং সাবটাইটেল বানাচ্ছে... (কিছুক্ষণ সময় লাগতে পারে)</p>

        <label>৩. সাবটাইটেল (SRT) আউটপুট:</label>
        <textarea id="output" placeholder="সাবটাইটেল এখানে তৈরি হবে..." readonly></textarea>
        
        <button id="downloadBtn" onclick="downloadSRT()">📥 SRT ফাইলটি ডাউনলোড করুন</button>
    </div>

    <script>
        async function generateSubtitle() {
            const apiKey = document.getElementById('apiKey').value.trim();
            const fileInput = document.getElementById('mediaFile');
            const status = document.getElementById('status');
            const output = document.getElementById('output');
            const generateBtn = document.getElementById('generateBtn');
            const downloadBtn = document.getElementById('downloadBtn');

            // বেসিক চেকিং
            if (!apiKey) { alert("দয়া করে আপনার API Key দিন!"); return; }
            if (!fileInput.files[0]) { alert("দয়া করে একটি ভিডিও বা অডিও ফাইল সিলেক্ট করুন!"); return; }

            const file = fileInput.files[0];
            
            // ২০ MB সাইজ লিমিট চেক (Inline data limit for Gemini API)
            if (file.size > 19 * 1024 * 1024) {
                alert("ফাইল সাইজ অনেক বড়! দয়া করে ২০ MB এর নিচের ফাইল দিন অথবা ভিডিওর রেজোলিউশন কমিয়ে নিন।");
                return;
            }

            // UI আপডেট
            status.style.display = "block";
            output.value = "";
            downloadBtn.style.display = "none";
            generateBtn.disabled = true;

            try {
                // ফাইলকে Base64 এ কনভার্ট করা
                const base64Data = await readFileAsBase64(file);
                const mimeType = file.type || "video/mp4";

                // Gemini 1.5 Flash API URL (ভিডিও প্রসেস করার জন্য সবচেয়ে ভালো)
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`;
                
                // API-কে দেওয়া নির্দেশ (Prompt)
                const promptText = "Please listen to this attached media carefully. Generate a highly accurate subtitle for it and translate it into Bengali. Strictly format the output as an SRT file with correct timestamps (e.g., 00:00:01,000 --> 00:00:05,000). Do not write any other introductory or concluding text, just output the raw SRT text.";

                const payload = {
                    contents: [{
                        parts: [
                            { text: promptText },
                            { inline_data: { mime_type: mimeType, data: base64Data } }
                        ]
                    }]
                };

                // API কল করা
                const response = await fetch(url, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });

                const result = await response.json();

                if (!response.ok) {
                    throw new Error(result.error?.message || "API সার্ভারে সমস্যা হয়েছে।");
                }

                // এআই-এর দেওয়া উত্তর বক্সে দেখানো
                const srtText = result.candidates[0].content.parts[0].text;
                output.value = srtText.trim();
                downloadBtn.style.display = "block";

            } catch (error) {
                console.error("Error:", error);
                output.value = "দুঃখিত, একটি সমস্যা হয়েছে:\n" + error.message;
            } finally {
                // প্রসেসিং শেষ হলে বাটন আবার চালু করা
                status.style.display = "none";
                generateBtn.disabled = false;
            }
        }

        // File to Base64 Converter Function
        function readFileAsBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => {
                    const base64String = reader.result.split(',')[1];
                    resolve(base64String);
                };
                reader.onerror = error => reject(error);
                reader.readAsDataURL(file);
            });
        }

        // SRT ডাউনলোড করার ফাংশন
        function downloadSRT() {
            const text = document.getElementById('output').value;
            const blob = new Blob([text], { type: 'text/plain' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = "gemini_bangla_subtitle.srt";
            document.body.appendChild(a);
            a.click();
            window.URL.revokeObjectURL(url);
            document.body.removeChild(a);
        }
    </script>

</body>
</html>
